<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Email Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .result.spam {
            background: #fee2e2;
            border: 2px solid #f44336;
            display: block;
        }

        .result.not-spam {
            background: #e3fcec;
            border: 2px solid #4caf50;
            display: block;
        }

        .result.spam h2 {
            color: #f44336;
        }

        .result.not-spam h2 {
            color: #4caf50;
        }

        .confidence {
            color: #666;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Spam Email Classifier</h1>
        <p class="subtitle">Paste an email or message to check if it's spam</p>

        <textarea id="message" rows="6" placeholder="Type or paste your message here..."></textarea>

        <button onclick="predict()">🔍 Check Message</button>

        <div id="result" class="result">
            <h2 id="resultTitle"></h2>
            <p id="resultMessage"></p>
            <div class="confidence" id="confidence"></div>
        </div>

        <footer>Built with Python, Flask, & Machine Learning | 97.49% Accuracy</footer>
    </div>

    <script>
        async function predict() {
            const message = document.getElementById('message').value;
            const resultDiv = document.getElementById('result');
            
            if (!message.trim()) {
                alert('Please enter a message');
                return;
            }

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error);

                resultDiv.className = data.is_spam ? 'result spam' : 'result not-spam';
                document.getElementById('resultTitle').innerHTML = data.is_spam ? '⚠️ SPAM DETECTED' : '✅ NOT SPAM';
                document.getElementById('resultMessage').innerHTML = data.is_spam ? 
                    'This message appears to be spam. Be careful!' : 
                    'This message appears to be legitimate.';
                document.getElementById('confidence').innerHTML = `Confidence: ${(data.confidence * 100).toFixed(2)}%`;

            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
